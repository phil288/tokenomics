name: CI

# Run the functional test suite on every commit (push) and pull request.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['24.x', '26.x']
    name: test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      # Zero runtime/dev dependencies — nothing to install. Tests use the
      # built-in node:test runner.
      - name: Run tests
        run: node --test

name: Release

# Manual-only. Pick a bump level when launching from the Actions tab
# (or `gh workflow run release.yml -f bump=minor`). The job bumps the version
# in package.json, commits it back to main, tags `v<new version>`, and cuts a
# GitHub release. This keeps the tag, the release, and the dashboard's
# self-update check (which compares against package.json / the latest tag) in
# lockstep — no manual version edit needed.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump level
        type: choice
        options: [patch, minor, major]
        default: patch

# Allow the job to push the version commit + tag and create the release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so the version commit pushes cleanly

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      # Gate the release on a green suite — never tag a broken build.
      # Zero deps, so nothing to install.
      - name: Run tests
        run: node --test

      - name: Bump version in package.json
        id: bump
        run: |
          npm version "${{ inputs.bump }}" --no-git-tag-version >/dev/null
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): $TAG"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin HEAD:main
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"
